name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run linting
        run: npm run lint

      - name: Validate Expo build configuration
        run: npx expo prebuild --dry-run

      - name: Auto Versioning (Expo app.json)
        run: |
          echo "Reading current version…"
          CURRENT_VERSION=$(node -p "require('./app.json').expo.version")
          echo "Current version: $CURRENT_VERSION"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "New version: $NEW_VERSION"

          node - <<EOF
          const fs = require('fs');
          const app = require('./app.json');
          app.expo.version = "$NEW_VERSION";
          app.expo.android = app.expo.android || {};
          app.expo.android.versionCode = (app.expo.android.versionCode || 1) + 1;
          fs.writeFileSync('./app.json', JSON.stringify(app, null, 2));
          EOF

          echo "Updated app.json:"
          cat app.json

      - name: Install Expo CLI & EAS CLI
        run: |
          npm install -g expo-cli
          npm install -g eas-cli

      - name: Expo Login
        run: eas login --token $EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (Classic Expo)
        run: expo build:android -t apk

      - name: Build AAB (EAS Build)
        run: eas build --platform android --profile production --non-interactive

      - name: Collect Build Artifacts
        run: |
          mkdir -p expo-builds
          APK=$(find . -name "*.apk" | head -n 1)
          AAB=$(find . -name "*.aab" | head -n 1)
          if [ -f "$APK" ]; then cp "$APK" expo-builds/app-release.apk; fi
          if [ -f "$AAB" ]; then cp "$AAB" expo-builds/app-release.aab; fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expo-builds
          path: expo-builds/
